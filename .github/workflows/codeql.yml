name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@2a4f6d29a8b6dac5c46cd60fcca47bd0fda21f9b  # v4.31.4
        with:
          languages: python
      - name: Autobuild
        uses: github/codeql-action/autobuild@2a4f6d29a8b6dac5c46cd60fcca47bd0fda21f9b  # v4.31.4
      - name: Analyze
        uses: github/codeql-action/analyze@2a4f6d29a8b6dac5c46cd60fcca47bd0fda21f9b  # v4.31.4
        with:
          category: '/language:python'
