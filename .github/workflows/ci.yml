name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check src tests
      - name: Mypy (strict)
        run: python -m mypy src/cortex_cycle_budget

  unit:
    name: Unit tests (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest tests/unit -v

  integration:
    name: Integration tests (real ARM toolchain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
          arm-none-eabi-gcc --version | head -1
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Integration tests
        run: python -m pytest tests/integration -v

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest --cov --cov-report=xml --cov-report=term
      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v5.0.0
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  action-smoke:
    name: Action smoke test (Cortex-${{ matrix.cortex }})
    runs-on: ubuntu-latest
    needs: [lint, unit]
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - cortex: m4
            example: minimal
            elf: control_loop.elf
            clock: 100
          - cortex: m7
            example: cortex-m7
            elf: foc_kernel.elf
            clock: 480
          - cortex: m33
            example: cortex-m33
            elf: isr.elf
            clock: 110
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955  # v4.3.0
      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
      - name: Rebuild example ELF
        working-directory: examples/${{ matrix.example }}
        run: |
          # Pick the only .c file in the directory and recompile from source.
          SRC=$(ls *.c)
          case "${{ matrix.cortex }}" in
            m0)  FLAGS="-mcpu=cortex-m0  -mthumb" ;;
            m4)  FLAGS="-mcpu=cortex-m4  -mthumb" ;;
            m7)  FLAGS="-mcpu=cortex-m7  -mthumb -mfpu=fpv5-sp-d16 -mfloat-abi=hard" ;;
            m33) FLAGS="-mcpu=cortex-m33 -mthumb -mfpu=fpv5-sp-d16 -mfloat-abi=hard" ;;
          esac
          arm-none-eabi-gcc $FLAGS -Os -nostdlib -ffreestanding \
            -Wl,-Ttext=0x0 -Wl,--entry=_start \
            "$SRC" -o "${{ matrix.elf }}"
      - name: Run composite action
        id: cycle
        uses: ./
        with:
          config-path: examples/${{ matrix.example }}/cycle-analysis.json
          elf-path: examples/${{ matrix.example }}/${{ matrix.elf }}
          target: ci-smoke-${{ matrix.cortex }}
          build-config: Release
          clock-mhz: ${{ matrix.clock }}
          cortex: ${{ matrix.cortex }}
          output-dir: smoke-out-${{ matrix.cortex }}
          # Install the in-repo package, not from PyPI.
          package-version: ' @ git+file://${{ github.workspace }}'
          post-comment: 'false'
          artifact-name: smoke-${{ matrix.cortex }}
      - name: Verify outputs
        run: |
          test -f smoke-out-${{ matrix.cortex }}/cycle_metrics.json
          test -f smoke-out-${{ matrix.cortex }}/pr_comment.md
          test -f smoke-out-${{ matrix.cortex }}/cpu_budget.md
          echo "max-cycles=${{ steps.cycle.outputs.max-cycles }}"
          echo "min-cycles=${{ steps.cycle.outputs.min-cycles }}"
          # Sanity: max should be > 0
          test "${{ steps.cycle.outputs.max-cycles }}" -gt 0
