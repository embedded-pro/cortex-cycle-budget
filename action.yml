name: 'Cortex Cycle Budget'
description: >-
  Static ARM Cortex-M (M0/M4/M7/M33) cycle-count estimation for a critical path
  through an ELF binary. Supports single-mode (one ELF / one config) and
  multi-mode (multiple critical paths via an `analyses-json` array). Produces
  a PR comment, GitHub Actions step summary, CPU budget table, annotated
  disassembly, and JSON metrics.
author: 'cortex-cycle-budget contributors'

branding:
  icon: 'activity'
  color: 'blue'

inputs:
  # ── Multi-mode (preferred for >1 critical path) ───────────────────────────
  analyses-json:
    description: >-
      JSON array of analysis entries for multi-mode runs. Each entry must have
      "label", "elf_path", "config_path", "output_dir". When provided, the
      single-mode inputs (config-path, elf-path) are ignored.
    required: false
    default: ''

  # ── Single-mode ───────────────────────────────────────────────────────────
  config-path:
    description: 'Path to the cycle-analysis JSON config file (single-mode).'
    required: false
    default: ''
  elf-path:
    description: 'Path to the ELF binary to analyze (single-mode).'
    required: false
    default: ''

  # ── Shared ────────────────────────────────────────────────────────────────
  target:
    description: 'Target board identifier (free-form label).'
    required: true
  build-config:
    description: 'Build configuration label (Release, Debug, RelWithDebInfo, …).'
    required: true
  clock-mhz:
    description: 'CPU clock frequency in MHz (positive integer).'
    required: true
  cortex:
    description: 'Cortex-M variant for the timing model (m0 | m4 | m7 | m33).'
    required: false
    default: 'm4'
  output-dir:
    description: 'Directory where reports and metrics are written.'
    required: false
    default: 'cycle-analysis'
  objdump:
    description: 'Path to the objdump tool (defaults to arm-none-eabi-objdump).'
    required: false
    default: ''
  objdump-tool:
    description: >-
      Alias for `objdump` (kept for backwards compatibility with existing
      consumer workflows). When both are set, `objdump` wins.
    required: false
    default: ''
  size-tool:
    description: 'Path to the size tool (defaults to arm-none-eabi-size).'
    required: false
    default: 'arm-none-eabi-size'
  strict:
    description: 'When false, do not fail if a path stage matches no functions.'
    required: false
    default: 'true'
  fail-over-max-cycles:
    description: >-
      If set to a positive integer, fail the action when the estimated max
      cycles exceeds this threshold.
    required: false
    default: ''
  python-version:
    description: 'Python version to set up.'
    required: false
    default: '3.11'
  package-version:
    description: >-
      pip-installable version specifier for cortex-cycle-budget (e.g.
      "==0.1.0" or "@git+https://…"). Empty installs the latest from PyPI.
    required: false
    default: ''
  post-comment:
    description: 'When true, post/update a PR comment with the results.'
    required: false
    default: 'true'
  comment-marker:
    description: >-
      HTML-comment marker used to find and update the idempotent PR comment.
      Override only to preserve continuity with a previous tool's marker.
    required: false
    default: '<!-- cortex-cycle-budget-comment -->'
  upload-artifacts:
    description: 'When true, upload the output directory as an artifact.'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the uploaded artifact.'
    required: false
    default: 'cycle-analysis'

outputs:
  output-dir:
    description: 'Absolute path to the directory containing the generated reports.'
    value: ${{ steps.run.outputs.output-dir }}
  comment-path:
    description: 'Path to the PR comment markdown (single- or multi-mode).'
    value: ${{ steps.run.outputs.comment-path }}
  summary-path:
    description: 'Path to the step-summary markdown (single- or multi-mode).'
    value: ${{ steps.run.outputs.summary-path }}
  max-cycles:
    description: >-
      Estimated maximum cycle count. Single-mode: across the critical path.
      Multi-mode: overall maximum across all analyses.
    value: ${{ steps.run.outputs.max-cycles }}
  min-cycles:
    description: >-
      Estimated minimum cycle count (single-mode only; empty in multi-mode).
    value: ${{ steps.run.outputs.min-cycles }}

runs:
  using: 'composite'
  steps:
    - name: Validate cortex variant
      shell: bash
      run: |
        case "${{ inputs.cortex }}" in
          m0|m4|m7|m33) ;;
          *) echo "::error::Invalid cortex variant '${{ inputs.cortex }}' (allowed: m0, m4, m7, m33)"; exit 1 ;;
        esac

    - name: Validate input combination
      shell: bash
      env:
        ANALYSES_JSON: ${{ inputs.analyses-json }}
      run: |
        set -euo pipefail
        if [[ -n "${ANALYSES_JSON}" ]]; then
          if [[ -n "${{ inputs.config-path }}" || -n "${{ inputs.elf-path }}" ]]; then
            echo "::warning::Both 'analyses-json' and single-mode inputs (config-path/elf-path) were provided. Running multi-mode; single-mode inputs are ignored."
          fi
        else
          if [[ -z "${{ inputs.config-path }}" || -z "${{ inputs.elf-path }}" ]]; then
            echo "::error::Either 'analyses-json' (multi-mode) or both 'config-path' and 'elf-path' (single-mode) must be provided."
            exit 1
          fi
        fi

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install cortex-cycle-budget
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.package-version }}" ]]; then
          python -m pip install --quiet "cortex-cycle-budget${{ inputs.package-version }}"
        else
          python -m pip install --quiet cortex-cycle-budget
        fi

    - name: Run cycle analysis
      id: run
      shell: bash
      env:
        ANALYSES_JSON: ${{ inputs.analyses-json }}
      run: |
        set -euo pipefail

        # Resolve objdump (prefer `objdump`, fall back to `objdump-tool` alias).
        OBJDUMP="${{ inputs.objdump }}"
        if [[ -z "${OBJDUMP}" ]]; then
          OBJDUMP="${{ inputs.objdump-tool }}"
        fi
        if [[ -z "${OBJDUMP}" ]]; then
          OBJDUMP="arm-none-eabi-objdump"
        fi

        STRICT_FLAG=""
        if [[ "${{ inputs.strict }}" != "true" ]]; then
          STRICT_FLAG="--no-strict"
        fi
        THRESHOLD_FLAG=""
        if [[ -n "${{ inputs.fail-over-max-cycles }}" ]]; then
          THRESHOLD_FLAG="--fail-over-max-cycles ${{ inputs.fail-over-max-cycles }}"
        fi

        OUTPUT_DIR="${{ inputs.output-dir }}"
        mkdir -p "${OUTPUT_DIR}"

        if [[ -n "${ANALYSES_JSON}" ]]; then
          # ── Multi-mode ──────────────────────────────────────────────────
          ANALYSES_FILE="${OUTPUT_DIR}/analyses.json"
          printf '%s' "${ANALYSES_JSON}" > "${ANALYSES_FILE}"

          cortex-cycle-budget-multi "${ANALYSES_FILE}" \
            --target "${{ inputs.target }}" \
            --build-config "${{ inputs.build-config }}" \
            --clock-mhz "${{ inputs.clock-mhz }}" \
            --cortex "${{ inputs.cortex }}" \
            --output-dir "${OUTPUT_DIR}" \
            --objdump "${OBJDUMP}" \
            --size-tool "${{ inputs.size-tool }}" \
            $STRICT_FLAG $THRESHOLD_FLAG

          MAX=$(python -c "import json; print(json.load(open('${OUTPUT_DIR}/combined_metrics.json'))['overall_max_cycles'])")
          echo "max-cycles=${MAX}" >> "$GITHUB_OUTPUT"
          echo "min-cycles=" >> "$GITHUB_OUTPUT"
          echo "comment-path=${OUTPUT_DIR}/combined_pr_comment.md" >> "$GITHUB_OUTPUT"
          echo "summary-path=${OUTPUT_DIR}/combined_step_summary.md" >> "$GITHUB_OUTPUT"
        else
          # ── Single-mode ─────────────────────────────────────────────────
          cortex-cycle-budget "${{ inputs.config-path }}" \
            --elf "${{ inputs.elf-path }}" \
            --target "${{ inputs.target }}" \
            --build-config "${{ inputs.build-config }}" \
            --clock-mhz "${{ inputs.clock-mhz }}" \
            --cortex "${{ inputs.cortex }}" \
            --output-dir "${OUTPUT_DIR}" \
            --objdump "${OBJDUMP}" \
            --size-tool "${{ inputs.size-tool }}" \
            $STRICT_FLAG $THRESHOLD_FLAG

          MAX=$(python -c "import json; print(json.load(open('${OUTPUT_DIR}/cycle_metrics.json'))['summary']['estimated_max_cycles'])")
          MIN=$(python -c "import json; print(json.load(open('${OUTPUT_DIR}/cycle_metrics.json'))['summary']['estimated_min_cycles'])")
          echo "max-cycles=${MAX}" >> "$GITHUB_OUTPUT"
          echo "min-cycles=${MIN}" >> "$GITHUB_OUTPUT"
          echo "comment-path=${OUTPUT_DIR}/pr_comment.md" >> "$GITHUB_OUTPUT"
          echo "summary-path=${OUTPUT_DIR}/cycle_estimation_report.md" >> "$GITHUB_OUTPUT"
        fi

        echo "output-dir=$(realpath "${OUTPUT_DIR}")" >> "$GITHUB_OUTPUT"

    - name: Append step summary
      shell: bash
      run: |
        SUMMARY_PATH="${{ steps.run.outputs.summary-path }}"
        if [[ -f "${SUMMARY_PATH}" ]]; then
          cat "${SUMMARY_PATH}" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Post PR comment
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
      env:
        COMMENT_PATH: ${{ steps.run.outputs.comment-path }}
        COMMENT_MARKER: ${{ inputs.comment-marker }}
      with:
        script: |
          const fs = require('fs');
          const commentPath = process.env.COMMENT_PATH;
          const marker = process.env.COMMENT_MARKER;
          if (!fs.existsSync(commentPath)) {
            core.warning(`PR comment file not found: ${commentPath}`);
            return;
          }
          let body = fs.readFileSync(commentPath, 'utf8');
          if (!body.includes(marker)) {
            body = `${marker}\n${body}`;
          }

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            per_page: 100,
          });
          const existing = comments.find(c => c.body && c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload analysis artifacts
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v5.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-dir }}
        if-no-files-found: warn
