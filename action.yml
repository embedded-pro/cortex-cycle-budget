name: 'Cortex Cycle Budget'
description: >-
  Static ARM Cortex-M (M0/M4/M7/M33) cycle-count estimation for a critical path
  through an ELF binary. Produces a PR comment, GitHub Actions step summary,
  CPU budget table, annotated disassembly, and JSON metrics.
author: 'cortex-cycle-budget contributors'

branding:
  icon: 'activity'
  color: 'blue'

inputs:
  config-path:
    description: 'Path to the cycle-analysis JSON config file.'
    required: true
  elf-path:
    description: 'Path to the ELF binary to analyze.'
    required: true
  target:
    description: 'Target board identifier (free-form label).'
    required: true
  build-config:
    description: 'Build configuration label (Release, Debug, RelWithDebInfo, …).'
    required: true
  clock-mhz:
    description: 'CPU clock frequency in MHz (positive integer).'
    required: true
  cortex:
    description: 'Cortex-M variant for the timing model (m0 | m4 | m7 | m33).'
    required: false
    default: 'm4'
  output-dir:
    description: 'Directory where reports and metrics are written.'
    required: false
    default: 'cycle-analysis'
  objdump:
    description: 'Path to the objdump tool (defaults to arm-none-eabi-objdump).'
    required: false
    default: 'arm-none-eabi-objdump'
  size-tool:
    description: 'Path to the size tool (defaults to arm-none-eabi-size).'
    required: false
    default: 'arm-none-eabi-size'
  strict:
    description: 'When false, do not fail if a path stage matches no functions.'
    required: false
    default: 'true'
  fail-over-max-cycles:
    description: >-
      If set to a positive integer, fail the action when the estimated max
      cycles exceeds this threshold.
    required: false
    default: ''
  python-version:
    description: 'Python version to set up.'
    required: false
    default: '3.11'
  package-version:
    description: >-
      pip-installable version specifier for cortex-cycle-budget (e.g.
      "==0.1.0" or "@git+https://…"). Empty installs the latest from PyPI.
    required: false
    default: ''
  post-comment:
    description: 'When true, post/update a PR comment with the results.'
    required: false
    default: 'true'
  upload-artifacts:
    description: 'When true, upload the output directory as an artifact.'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the uploaded artifact.'
    required: false
    default: 'cycle-analysis'

outputs:
  output-dir:
    description: 'Absolute path to the directory containing the generated reports.'
    value: ${{ steps.run.outputs.output-dir }}
  max-cycles:
    description: 'Estimated maximum cycle count across the critical path.'
    value: ${{ steps.run.outputs.max-cycles }}
  min-cycles:
    description: 'Estimated minimum cycle count across the critical path.'
    value: ${{ steps.run.outputs.min-cycles }}

runs:
  using: 'composite'
  steps:
    - name: Validate cortex variant
      shell: bash
      run: |
        case "${{ inputs.cortex }}" in
          m0|m4|m7|m33) ;;
          *) echo "::error::Invalid cortex variant '${{ inputs.cortex }}' (allowed: m0, m4, m7, m33)"; exit 1 ;;
        esac

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install cortex-cycle-budget
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "${{ inputs.package-version }}" ]]; then
          python -m pip install --quiet "cortex-cycle-budget${{ inputs.package-version }}"
        else
          python -m pip install --quiet cortex-cycle-budget
        fi

    - name: Run cycle analysis
      id: run
      shell: bash
      run: |
        set -euo pipefail
        STRICT_FLAG=""
        if [[ "${{ inputs.strict }}" != "true" ]]; then
          STRICT_FLAG="--no-strict"
        fi
        THRESHOLD_FLAG=""
        if [[ -n "${{ inputs.fail-over-max-cycles }}" ]]; then
          THRESHOLD_FLAG="--fail-over-max-cycles ${{ inputs.fail-over-max-cycles }}"
        fi

        cortex-cycle-budget "${{ inputs.config-path }}" \
          --elf "${{ inputs.elf-path }}" \
          --target "${{ inputs.target }}" \
          --build-config "${{ inputs.build-config }}" \
          --clock-mhz "${{ inputs.clock-mhz }}" \
          --cortex "${{ inputs.cortex }}" \
          --output-dir "${{ inputs.output-dir }}" \
          --objdump "${{ inputs.objdump }}" \
          --size-tool "${{ inputs.size-tool }}" \
          $STRICT_FLAG $THRESHOLD_FLAG

        echo "output-dir=$(realpath "${{ inputs.output-dir }}")" >> "$GITHUB_OUTPUT"
        MAX=$(python -c "import json; print(json.load(open('${{ inputs.output-dir }}/cycle_metrics.json'))['summary']['estimated_max_cycles'])")
        MIN=$(python -c "import json; print(json.load(open('${{ inputs.output-dir }}/cycle_metrics.json'))['summary']['estimated_min_cycles'])")
        echo "max-cycles=$MAX" >> "$GITHUB_OUTPUT"
        echo "min-cycles=$MIN" >> "$GITHUB_OUTPUT"

    - name: Append step summary
      shell: bash
      run: |
        if [[ -f "${{ inputs.output-dir }}/cycle_estimation_report.md" ]]; then
          cat "${{ inputs.output-dir }}/cycle_estimation_report.md" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Post PR comment
      if: ${{ inputs.post-comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const commentPath = path.join('${{ inputs.output-dir }}', 'pr_comment.md');
          if (!fs.existsSync(commentPath)) {
            core.warning(`PR comment file not found: ${commentPath}`);
            return;
          }
          const body = fs.readFileSync(commentPath, 'utf8');
          const marker = '<!-- cortex-cycle-budget-comment -->';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body && c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }

    - name: Upload analysis artifacts
      if: ${{ inputs.upload-artifacts == 'true' }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v5.0.0
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-dir }}
        if-no-files-found: warn
